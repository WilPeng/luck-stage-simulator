                enabled:
                  type: boolean
                  description: 是否开启聊天
            example:
              enabled: false
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /admin/chat/clear:
    post:
      tags: [聊天]
      summary: 清空聊天记录（管理员）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  # ==============================================================
  # 赛季管理
  # ==============================================================

  /season:
    get:
      tags: [赛季]
      summary: 获取赛季配置（含所有业务参数）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      currentRound:
                        type: integer
                      currentStage:
                        $ref: '#/components/schemas/Stage'
                      totalRounds:
                        type: integer
                      trainingDrawsPerPlayer:
                        type: integer
                      baseScore:
                        type: number
                      scoreMultiplier:
                        type: number
                      teamRankBonusBase:
                        type: number
                      teamRankBonusMultiplier:
                        type: number
        '401':
          description: 未授权

  /season/config:
    put:
      tags: [赛季]
      summary: 更新赛季配置（管理员）
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                totalRounds:
                  type: integer
                trainingDrawsPerPlayer:
                  type: integer
                baseScore:
                  type: number
                scoreMultiplier:
                  type: number
                randomMin:
                  type: number
                randomMax:
                  type: number
                teamRankBonusBase:
                  type: number
                teamRankBonusMultiplier:
                  type: number
                teamRandomMin:
                  type: number
                teamRandomMax:
                  type: number
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /season/restart:
    post:
      tags: [赛季]
      summary: 一键重新开始（保留历史公演和淘汰）
      description: |
        行为：
        - 清空当前轮的队伍/成员/训练/彩排
        - 所有选手 status=ACTIVE，role=player
        - 保留历史公演结果和淘汰记录
        - currentRound=1，currentStage=PREPARATION
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /season/reset:
    post:
      tags: [赛季]
      summary: 完全重置（清空所有数据）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /season/history:
    get:
      tags: [赛季]
      summary: 获取某轮历史数据（综合）
      parameters:
        - name: roundIndex
          in: query
          required: false
          schema:
            type: integer
          description: 轮次（不传则返回所有历史）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: '#/components/schemas/RoundTeam'
                      members:
                        type: array
                        items:
                          type: object
                      teamPerformances:
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamPerformance'
                      playerPerformances:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlayerPerformance'
                      eliminations:
                        type: array
                        items:
                          $ref: '#/components/schemas/Elimination'
        '401':
          description: 未授权

  # ==============================================================
  # 日志
  # ==============================================================

  /logs:
    get:
      tags: [日志]
      summary: 获取操作日志（管理员）
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 50
        - name: actionType
          in: query
          required: false
          schema:
            type: string
          description: 按操作类型筛选
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        userId:
                          type: string
                        userName:
                          type: string
                        role:
                          type: string
                        actionType:
                          type: string
                        targetType:
                          type: string
                        targetId:
                          type: string
                        detail:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  # ==============================================================
  # 认证
  # ==============================================================

  /auth/login:
    post:
      tags: [认证]
      summary: 登录（使用登录码）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 登录码（管理员：ADMIN2026，选手：CF2026-A001 等）
            example:
              code: ADMIN2026
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      role:
                        type: string
                      avatar:
                        type: string
                        nullable: true
                  token:
                    type: string
                    description: JWT token
        '404':
          description: 登录码不存在
