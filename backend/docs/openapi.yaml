openapi: 3.0.3
info:
  title: 乘风2026模拟系统 API
  description: |
    ## 产品规范说明

    本文档是前后端开发的唯一真源（Single Source of Truth）。
    所有开发必须严格遵循本文档，不得自行发明/修改接口路径、参数名、枚举值。

    ### 阶段枚举（Stage）
    以下枚举值在前后端必须完全一致，禁止使用其他字符串：

    | 值 | 中文 | 索引 |
    |---|---|---|
    | PREPARATION | 预先准备 | 0 |
    | CAPTAIN_VOTE | 队长选举 | 1 |
    | TEAMING | 组队 | 2 |
    | SONG_SELECT | 选歌 | 3 |
    | TRAINING | 训练 | 4 |
    | REHEARSAL | 彩排 | 5 |
    | PERFORMANCE | 公演 | 6 |
    | ELIMINATION | 淘汰 | 7 |

    ### 状态枚举（StageStatus）
    所有状态由后端根据 currentRound + currentStage 统一计算返回，前端禁止自行计算。

    | 值 | 含义 | 前端行为 |
    |---|---|---|
    | completed | 已完成 | 可点击，只读 |
    | current | 当前进行 | 可点击，可操作 |
    | future | 未开始 | 禁用，不可点击 |

  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: 本地开发服务器

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Stage:
      type: string
      enum:
        - PREPARATION
        - CAPTAIN_VOTE
        - TEAMING
        - SONG_SELECT
        - TRAINING
        - REHEARSAL
        - PERFORMANCE
        - ELIMINATION
      description: 阶段枚举，顺序固定

    StageStatus:
      type: string
      enum:
        - completed
        - current
        - future
      description: 阶段状态，由后端根据 currentRound + currentStage 统一计算

    PlayerStatus:
      type: string
      enum:
        - ACTIVE
        - ELIMINATED

    # ===== 核心响应包装 =====
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        error:
          type: string
          description: 错误信息（仅 success=false 时返回）
        code:
          type: string
          description: 错误码（仅 success=false 时返回）

    # ===== 赛季状态 =====
    ProgressState:
      type: object
      properties:
        currentRound:
          type: integer
          description: 当前第几公演（1=一公）
          example: 2
        currentStage:
          $ref: '#/components/schemas/Stage'
        currentStageName:
          type: string
          example: 组队
        totalRounds:
          type: integer
          example: 3

    # ===== 矩阵条目 =====
    MatrixEntry:
      type: object
      properties:
        round:
          type: integer
          description: 轮次（1=一公）
          example: 1
        stage:
          $ref: '#/components/schemas/Stage'
        stageName:
          type: string
          example: 队长选举
        status:
          $ref: '#/components/schemas/StageStatus'

    # ===== 矩阵响应 =====
    MatrixResponse:
      type: object
      properties:
        currentRound:
          type: integer
        currentStage:
          $ref: '#/components/schemas/Stage'
        currentStageName:
          type: string
        totalRounds:
          type: integer
        matrix:
          type: array
          items:
            $ref: '#/components/schemas/MatrixEntry'

    # ===== 设置进度请求 =====
    SetProgressRequest:
      type: object
      required:
        - round
        - stage
      properties:
        round:
          type: integer
          minimum: 1
          description: 目标轮次（1=一公）
          example: 2
        stage:
          $ref: '#/components/schemas/Stage'

    # ===== 设置进度响应 =====
    SetProgressResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            currentRound:
              type: integer
            currentStage:
              $ref: '#/components/schemas/Stage'
            currentStageName:
              type: string

    # ===== 自动推进响应 =====
    NextProgressResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            currentRound:
              type: integer
            currentStage:
              $ref: '#/components/schemas/Stage'
            currentStageName:
              type: string

    # ===== 选手 =====
    Player:
      type: object
      properties:
        id:
          type: string
          example: u001
        name:
          type: string
          example: 星野
        avatar:
          type: string
          nullable: true
          example: /uploads/avatars/xxx.jpg
        attributes:
          type: object
          properties:
            vocal:
              type: integer
            dance:
              type: integer
            charm:
              type: integer
        status:
          $ref: '#/components/schemas/PlayerStatus'
        role:
          type: string
          enum: [admin, captain, player]
          example: player

    PlayerPublic:
      type: object
      description: 选手公开信息（不含属性，用于队伍展示等场景）
      properties:
        id:
          type: string
        name:
          type: string
        avatar:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/PlayerStatus'
        role:
          type: string
          enum: [admin, captain, player]

    # ===== 轮次队伍 =====
    RoundTeam:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        roundIndex:
          type: integer
        name:
          type: string
          example: 第1组
        captainId:
          type: string
          nullable: true
        maxMembers:
          type: integer
          example: 6
        members:
          type: array
          description: 队员列表（脱敏版，不含属性）
          items:
            $ref: '#/components/schemas/PlayerPublic'

    # ===== 歌曲 =====
    Song:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: 逆风盛放
        difficulty:
          type: integer
          description: 难度 1-5
        vocalWeight:
          type: integer
        danceWeight:
          type: integer
        charmWeight:
          type: integer
        style:
          type: string
          example: 抒情

    RoundSong:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        songId:
          type: string
        songType:
          type: string
          enum: [team_show, team_collab, captain_show, pk_show]
          default: team_show
        released:
          type: boolean
          description: 是否已释放到选歌阶段

    # ===== 歌曲归属 =====
    TeamSong:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        teamId:
          type: string
        songId:
          type: string
        assignedBy:
          type: string
          description: 分配方式 auto|manual|grab

    # ===== 训练记录 =====
    TrainingRecord:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        playerId:
          type: string
        playerName:
          type: string
        cardId:
          type: string
        cardName:
          type: string
        cardType:
          type: string
        effect:
          type: object
        attributeChanges:
          type: object
          description: 属性变化 { vocal: +3, dance: 0, charm: -2 }
        createdAt:
          type: string
          format: date-time

    # ===== 彩排结果 =====
    RehearsalResult:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        teamId:
          type: string
        teamName:
          type: string
        eventId:
          type: string
          nullable: true
        eventName:
          type: string
          nullable: true
        bonus:
          type: object
          properties:
            team:
              type: number
              description: 团队彩排加分
            each:
              type: number
              description: 个人彩排加分
        finalScore:
          type: number
          description: 彩排总分
        createdAt:
          type: string
          format: date-time

    # ===== 团队公演结果 =====
    TeamPerformance:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        roundIndex:
          type: integer
        teamId:
          type: string
        teamName:
          type: string
        songId:
          type: string
          nullable: true
        songName:
          type: string
          nullable: true
        attrScore:
          type: number
          description: 属性得分
        randomScore:
          type: number
          description: 随机分
        rehearsalBonus:
          type: number
          description: 彩排加分
        finalScore:
          type: number
          description: 最终总分
        rank:
          type: integer
          description: 排名（1=最高分）
        createdAt:
          type: string
          format: date-time

    # ===== 选手公演结果 =====
    PlayerPerformance:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        roundIndex:
          type: integer
        playerId:
          type: string
        playerName:
          type: string
        teamId:
          type: string
          nullable: true
        teamName:
          type: string
          nullable: true
        songId:
          type: string
          nullable: true
        songName:
          type: string
          nullable: true
        attrScore:
          type: number
        randomScore:
          type: number
        teamScoreShare:
          type: number
          description: 团队排名加成
        rehearsalBonus:
          type: number
        finalScore:
          type: number
        rank:
          type: integer
          description: 个人排名
        createdAt:
          type: string
          format: date-time

    # ===== 淘汰记录 =====
    Elimination:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        roundIndex:
          type: integer
        playerId:
          type: string
        userName:
          type: string
        teamId:
          type: string
          nullable: true
        teamName:
          type: string
          nullable: true
        finalScore:
          type: number
          nullable: true
        rank:
          type: integer
          nullable: true
        reason:
          type: string
        eliminated:
          type: boolean
          default: true
        eliminatedAt:
          type: string
          format: date-time
        restoredAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ===== 队长投票 =====
    CaptainVote:
      type: object
      properties:
        id:
          type: string
        roundId:
          type: string
        voterId:
          type: string
        voterName:
          type: string
        candidateId:
          type: string
        candidateName:
          type: string
        createdAt:
          type: string
          format: date-time

    # ===== 预先准备配置 =====
    PreparationConfig:
      type: object
      properties:
        teamStructures:
          type: array
          items:
            type: integer
          description: 每队人数数组，如 [6,6,4,4,4] 表示5支队伍
          example: [6, 6, 4, 4, 4]
        songPool:
          type: array
          description: 歌曲池（RoundSong id 列表）
          items:
            type: string

    # ===== 聊天消息 =====
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        senderRole:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    # ===== 统一列表响应 =====
    ListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items: {}

    # ===== 统一分页响应 =====
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items: {}
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

security:
  - BearerAuth: []

paths:
  # ==============================================================
  # 阶段控制
  # ==============================================================

  /admin/progress/set:
    post:
      tags: [阶段控制]
      summary: 设置赛程状态（管理员）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetProgressRequest'
            example:
              round: 2
              stage: TRAINING
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetProgressResponse'
              example:
                success: true
                currentRound: 2
                currentStage: TRAINING
                currentStageName: 训练
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /admin/progress/next:
    post:
      tags: [阶段控制]
      summary: 自动推进到下一阶段（管理员）
      description: |
        规则：
        - 当前阶段 → STAGE_ORDER 中下一个
        - 如果当前是 ELIMINATION → currentRound + 1，currentStage → PREPARATION
        - 如果已是最后一轮 + 最后一个阶段 → 返回错误
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NextProgressResponse'
              example:
                success: true
                currentRound: 2
                currentStage: PREPARATION
                currentStageName: 预先准备
        '400':
          description: 已是最后一轮，无法推进
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权

  /admin/progress:
    get:
      tags: [阶段控制]
      summary: 获取当前赛程状态（管理员）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgressState'
              example:
                currentRound: 1
                currentStage: TEAMING
                currentStageName: 组队
                totalRounds: 3
        '401':
          description: 未授权

  /season/progress/matrix:
    get:
      tags: [阶段控制]
      summary: 获取赛程矩阵（所有轮次 × 所有阶段的状态）
      description: 状态由后端根据 currentRound + currentStage 统一计算，前端禁止自行计算。
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatrixResponse'
              example:
                currentRound: 2
                currentStage: TRAINING
                currentStageName: 训练
                totalRounds: 3
                matrix:
                  - round: 1
                    stage: PREPARATION
                    stageName: 预先准备
                    status: completed
                  - round: 2
                    stage: TRAINING
                    stageName: 训练
                    status: current
                  - round: 2
                    stage: REHEARSAL
                    stageName: 彩排
                    status: future
        '401':
          description: 未授权

  /season/progress:
    get:
      tags: [阶段控制]
      summary: 获取赛程矩阵（含 data 包装，与 /season/progress/matrix 等价）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/MatrixResponse'
        '401':
          description: 未授权

  /season/stages:
    get:
      tags: [阶段控制]
      summary: 获取阶段枚举列表
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          $ref: '#/components/schemas/Stage'
                        index:
                          type: integer
                        name:
                          type: string
              example:
                success: true
                data:
                  - key: PREPARATION
                    index: 0
                    name: 预先准备
                  - key: CAPTAIN_VOTE
                    index: 1
                    name: 队长选举
                  - key: TEAMING
                    index: 2
                    name: 组队
                  - key: SONG_SELECT
                    index: 3
                    name: 选歌
                  - key: TRAINING
                    index: 4
                    name: 训练
                  - key: REHEARSAL
                    index: 5
                    name: 彩排
                  - key: PERFORMANCE
                    index: 6
                    name: 公演
                  - key: ELIMINATION
                    index: 7
                    name: 淘汰

  # ==============================================================
  # 预先准备
  # ==============================================================

  /admin/round/{round}/preparation:
    get:
      tags: [预先准备]
      summary: 获取某轮预先准备配置
      parameters:
        - name: round
          in: path
          required: true
          schema:
            type: integer
          description: 轮次（1=一公）
          example: 1
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/PreparationConfig'
        '401':
          description: 未授权
    post:
      tags: [预先准备]
      summary: 保存某轮预先准备配置
      parameters:
        - name: round
          in: path
          required: true
          schema:
            type: integer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreparationConfig'
            example:
              teamStructures: [6, 6, 4, 4, 4]
              songPool: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  # ==============================================================
  # 队长选举
  # ==============================================================

  /admin/round/{round}/captains:
    get:
      tags: [队长选举]
      summary: 获取某轮队长信息
      parameters:
        - name: round
          in: path
          required: true
          schema:
            type: integer
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        playerId:
                          type: string
                        playerName:
                          type: string
                        teamId:
                          type: string
                          nullable: true
                        assignedBy:
                          type: string
                          enum: [vote, admin]
      '401':
        description: 未授权
    post:
      tags: [队长选举]
      summary: 管理员指定/覆盖某轮队长
      parameters:
        - name: round
          in: path
          required: true
          schema:
            type: integer
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - playerId
              properties:
                playerId:
                  type: string
                  description: 选手ID
                teamId:
                  type: string
                  description: 队伍ID（可选，不传则自动分配）
            example:
              playerId: u001
              teamId: team-xxx
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /player/captain-vote:
    post:
      tags: [队长选举]
      summary: 选手投票给队长
      description: 每位选手只能投一票
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - candidateId
              properties:
                candidateId:
                  type: string
                  description: 被投票的选手ID
            example:
              candidateId: u002
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 已投过票 / 参数错误
        '401':
          description: 未授权

  /captain/votes:
    get:
      tags: [队长选举]
      summary: 获取当前轮队长投票结果
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CaptainVote'

  # ==============================================================
  # 组队
  # ==============================================================

  /admin/team/assign:
    post:
      tags: [组队]
      summary: 管理员手动分配队员到队伍
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
                - assignments
              properties:
                roundId:
                  type: string
                  description: 轮次ID
                assignments:
                  type: array
                  items:
                    type: object
                    properties:
                      teamId:
                        type: string
                      playerIds:
                        type: array
                        items:
                          type: string
                        description: 队员ID列表
            example:
              roundId: round-1
              assignments:
                - teamId: team-1
                  playerIds: [u001, u002, u003]
                - teamId: team-2
                  playerIds: [u004, u005, u006]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /admin/team/random:
    post:
      tags: [组队]
      summary: 管理员随机分配未入队选手到有空位的队伍
      description: 已有队长的队伍，队长不变；其余选手随机分配
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
