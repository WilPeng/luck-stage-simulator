        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        type:
                          type: string
                          enum: [vocal, dance, charm, mixed, event]
                        description:
                          type: string
                        effect:
                          type: object
                        weight:
                          type: integer
                        enabled:
                          type: boolean

  /admin/training/statistics:
    get:
      tags: [训练]
      summary: 获取某轮训练统计
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalDraws:
                        type: integer
                      playerStats:
                        type: array
                        items:
                          type: object
                          properties:
                            playerId:
                              type: string
                            playerName:
                              type: string
                            drawCount:
                              type: integer
                            remainingDraws:
                              type: integer
                            totalRecords:
                              type: integer
        '401':
          description: 未授权

  /player/training/draw:
    post:
      tags: [训练]
      summary: 选手抽训练卡
      description: |
        规则：
        - 每位选手每轮有固定训练次数（Season.trainingDrawsPerPlayer）
        - 抽卡后随机选中一张卡，更新选手属性
        - 写入 TrainingRecord
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
              properties:
                roundId:
                  type: string
            example:
              roundId: round-1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      card:
                        $ref: '#/components/schemas/TrainingRecord'
                      remainingDraws:
                        type: integer
                      attributeChanges:
                        type: object
        '400':
          description: 训练次数已用完
        '401':
          description: 未授权

  /training/records:
    get:
      tags: [训练]
      summary: 获取某轮训练记录列表
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
        - name: playerId
          in: query
          required: false
          schema:
            type: string
          description: 可选，筛选特定选手
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrainingRecord'
        '401':
          description: 未授权

  # ==============================================================
  # 彩排
  # ==============================================================

  /admin/rehearsal/generate:
    post:
      tags: [彩排]
      summary: 管理员生成彩排结果（随机事件）
      description: |
        为指定队伍生成彩排结果，包含随机事件和 bonus 加分
        可指定 teamId 单队生成，或 all=true 为所有队生成
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
              properties:
                roundId:
                  type: string
                teamId:
                  type: string
                  nullable: true
                  description: 可选，指定队伍ID
                all:
                  type: boolean
                  default: false
                  description: 是否为所有队伍生成
            example:
              roundId: round-1
              all: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RehearsalResult'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /rehearsal/results:
    get:
      tags: [彩排]
      summary: 获取某轮彩排结果
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RehearsalResult'
        '401':
          description: 未授权

  # ==============================================================
  # 公演
  # ==============================================================

  /admin/performance/calculate:
    post:
      tags: [公演]
      summary: 执行公演结算（一次性计算所有队伍和选手的分数）
      description: |
        计算规则：
        1. 删除该轮旧的 TeamPerformance 和 PlayerPerformance
        2. 计算每个 team 的 finalScore = baseScore + 属性加权平均 + 随机分 + 彩排加分
        3. 计算每个 player 的 finalScore = baseScore + 属性加权 + 随机分 + 团队名次加成 + 彩排加分
        4. 按分数排序，写入 rank
        5. 返回新的结果
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
              properties:
                roundId:
                  type: string
            example:
              roundId: round-1
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      teamPerformances:
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamPerformance'
                      playerPerformances:
                        type: array
                        items:
                          $ref: '#/components/schemas/PlayerPerformance'
        '400':
          description: 该轮没有队伍，无法结算
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /performance/teams:
    get:
      tags: [公演]
      summary: 获取某轮团队公演结果列表
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamPerformance'
        '401':
          description: 未授权

  /performance/players:
    get:
      tags: [公演]
      summary: 获取某轮选手公演结果列表
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PlayerPerformance'
        '401':
          description: 未授权

  # ==============================================================
  # 淘汰
  # ==============================================================

  /admin/elimination/confirm:
    post:
      tags: [淘汰]
      summary: 管理员确认淘汰结果
      description: |
        批量淘汰选手：
        1. 将选手 User.status 设为 ELIMINATED
        2. 写入 Elimination 记录
        3. 保留历史记录
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
                - playerIds
              properties:
                roundId:
                  type: string
                playerIds:
                  type: array
                  items:
                    type: string
                  description: 被淘汰的选手ID列表
                reason:
                  type: string
                  default: 公演淘汰
            example:
              roundId: round-1
              playerIds: [u005, u006]
              reason: 公演淘汰
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      eliminatedCount:
                        type: integer
                      eliminatedList:
                        type: array
                        items:
                          $ref: '#/components/schemas/Elimination'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /elimination/candidates:
    get:
      tags: [淘汰]
      summary: 获取淘汰候选名单（未被淘汰的选手，含公演分）
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    description: 按 personalScore 升序排列（分数低的在前面，方便选择淘汰）
                    items:
                      type: object
                      properties:
                        playerId:
                          type: string
                        name:
                          type: string
                        avatar:
                          type: string
                          nullable: true
                        teamId:
                          type: string
                          nullable: true
                        teamName:
                          type: string
                          nullable: true
                        personalScore:
                          type: number
                          description: 个人公演最终分
                        personalRank:
                          type: integer
                          nullable: true
                        teamScore:
                          type: number
                          description: 团队公演最终分（用于团秀得分排序）
                        teamRank:
                          type: integer
                          nullable: true
        '401':
          description: 未授权

  /elimination:
    get:
      tags: [淘汰]
      summary: 获取某轮淘汰记录列表
      parameters:
        - name: roundId
          in: query
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Elimination'
        '401':
          description: 未授权

  /admin/elimination/restore/{playerId}:
