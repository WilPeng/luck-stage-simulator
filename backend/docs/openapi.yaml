  # ==============================================================
  # 选歌
  # ==============================================================

  /songs:
    get:
      tags: [选歌]
      summary: 获取歌曲库（所有歌曲）
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Song'

  /admin/song/release:
    post:
      tags: [选歌]
      summary: 管理员将歌曲释放到某轮的歌曲池
      description: 将歌曲库中的歌曲加入 RoundSong（RoundSong.released=true）
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
                - songIds
              properties:
                roundId:
                  type: string
                songIds:
                  type: array
                  items:
                    type: string
                  description: 歌曲ID列表
                songType:
                  type: string
                  enum: [team_show, team_collab, captain_show, pk_show]
                  default: team_show
            example:
              roundId: round-1
              songIds: [s001, s002, s003, s004, s005]
              songType: team_show
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /admin/song/assign:
    post:
      tags: [选歌]
      summary: 管理员直接将歌曲分配给某队
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - roundId
                - assignments
              properties:
                roundId:
                  type: string
                assignments:
                  type: array
                  items:
                    type: object
                    properties:
                      teamId:
                        type: string
                      songId:
                        type: string
            example:
              roundId: round-1
              assignments:
                - teamId: team-1
                  songId: s001
                - teamId: team-2
                  songId: s002
      responses:
        '200':
          description: 成功
        '401':
          description: 未授权
        '403':
          description: 仅管理员可用

  /songs/round/{roundId}:
    get:
      tags: [选歌]
      summary: 获取某轮的歌曲池和已分配信息
      parameters:
        - name: roundId
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      roundSongs:
                        description: 本轮歌曲池（RoundSong 列表）
                        type: array
                        items:
                          $ref: '#/components/schemas/RoundSong'
                      teamSongs:
                        description: 已分配到队伍的歌曲（TeamSong 列表）
                        type: array
                        items:
                          $ref: '#/components/schemas/TeamSong'
        '401':
          description: 未授权

  /player/song/grab:
    post:
      tags: [选歌]
      summary: 选手抢歌曲（需事务锁，保证最快点击成功）
      description: |
        事务逻辑：
        1. 锁定该轮该歌曲
        2. 检查是否已被抢
        3. 已分配则返回失败
        4. 未分配则写入 TeamSong
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teamId
                - songId
              properties:
                teamId:
                  type: string
                  description: 队伍ID
                songId:
                  type: string
                  description: 歌曲ID
            example:
              teamId: team-1
              songId: s001
      responses:
        '200':
          description: 抢歌成功
        '400':
          description: 歌曲已被抢走
        '401':
          description: 未授权

  # ==============================================================
  # 训练
  # ==============================================================

  /training/cards:
